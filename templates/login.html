{% extends "base.html" %}

{% block body %}
<div class="panel" style="max-width:420px;margin:60px auto;">
  <h2>Sign in</h2>
  <p class="muted">Viewer can browse/download artifacts. Admin can also trigger generation.</p>
  <form method="post">
    <p>
      <label>Username<br />
      <input name="username" required style="width:100%;padding:8px;" /></label>
    </p>
    <p>
      <label>Password<br />
      <input type="password" name="password" required style="width:100%;padding:8px;" /></label>
    </p>
    <button type="submit">Login</button>
  </form>
</div>
{% endblock %}
